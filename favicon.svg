  <defs>
    <radialGradient id="gold" cx="38%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#fff7c0"/>
      <stop offset="55%" stop-color="#ffe135"/>
      <stop offset="100%" stop-color="#f0b800"/>
