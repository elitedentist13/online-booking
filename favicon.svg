  </defs>
  <circle cx="16" cy="16" r="15" fill="url(#gold)" stroke="#E6A800" stroke-width="0.8"/>
  <text x="16" y="21.5" font-size="19" text-anchor="middle" dominant-baseline="middle"
        font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji, sans-serif">&#127820;</text>
